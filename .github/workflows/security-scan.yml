name: セキュリティスキャン

on:
  # 手動実行のみ（プライベートリポジトリのActions実行時間制約のため）
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'スキャンタイプ'
        required: true
        default: 'comprehensive'
        type: choice
        options:
          - 'comprehensive'
          - 'codeql-only'
          - 'security-only'
          - 'sbom-only'
# 緊急時のみ自動実行
  # push:
  #   branches: [main, develop]
  # pull_request:
  #   branches: [ main, develop ]
  # schedule:
  #   # 毎週月曜日の午前3時（UTC）に実行
  #   - cron: '0 3 * * 1'

jobs:
  codeql:
    name: CodeQL セキュリティ分析
    runs-on: ubuntu-latest
    # 手動実行時のみ、かつcodeqlスキャンが選択された場合のみ実行
    if: >
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.scan_type == 'comprehensive' ||
       github.event.inputs.scan_type == 'codeql-only')

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['python']

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: CodeQL 初期化
        id: codeql-init
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
        continue-on-error: true

      - name: 自動ビルド
        if: steps.codeql-init.outcome == 'success'
        uses: github/codeql-action/autobuild@v3
        continue-on-error: true

      - name: CodeQL 分析実行
        if: steps.codeql-init.outcome == 'success'
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"
        continue-on-error: true

      - name: CodeQL スキップ通知
        if: steps.codeql-init.outcome != 'success'
        run: |
          echo "⚠️ CodeQL分析がスキップされました"
          echo "理由: GitHub Advanced Securityが有効でないか、"
          echo "コードスキャニングが設定されていません"
          url="https://docs.github.com/en/code-security/code-scanning"
          path="automatically-scanning-your-code-for-vulnerabilities-and-errors"
          echo "詳細: $url/$path/setting-up-code-scanning-for-a-repository"

  comprehensive-security-scan:
    name: 包括的セキュリティスキャン
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.scan_type == 'comprehensive' ||
       github.event.inputs.scan_type == 'security-only')

    permissions:
      contents: read
      security-events: write

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          allow-prereleases: true

      - name: uv セットアップ
        uses: astral-sh/setup-uv@v1
        with:
          enable-cache: true

      - name: 依存関係インストール
        run: uv sync --python 3.13

      - name: 包括的セキュリティスキャン実行
        run: |
          echo "🚀 セキュリティスキャンを開始します..."
          uv run python scripts/security_scan.py --scan-type=all
        continue-on-error: true

      - name: セキュリティレポートの確認
        run: |
          echo "📄 セキュリティレポートを確認中..."

          # レポートディレクトリの存在確認
          if [ ! -d "security_reports" ]; then
            echo "❌ security_reports ディレクトリが存在しません"
            exit 1
          fi

          echo "📁 生成されたファイル:"
          ls -la security_reports/ || echo "ファイル一覧の取得に失敗"

          if [ -f security_reports/security_summary.json ]; then
            echo "✅ セキュリティスキャン結果サマリー:"
            cat security_reports/security_summary.json | jq '.' || cat security_reports/security_summary.json

            # 脆弱性の数をチェック
            summary='security_reports/security_summary.json'
            bandit_issues=$(jq '.scan_results.bandit.issues_count // 0' \
              $summary 2>/dev/null || echo "0")
            audit_vulnerabilities=$(jq '.scan_results.pip_audit.vulnerabilities_count // 0' \
              $summary 2>/dev/null || echo "0")

            echo "Bandit 問題数: $bandit_issues"
            echo "pip-audit 脆弱性数: $audit_vulnerabilities"

            # セキュリティ問題の報告（警告レベル）
            if [ "$bandit_issues" -gt 0 ] || [ "$audit_vulnerabilities" -gt 0 ]; then
              echo "⚠️  セキュリティ問題が検出されました（警告レベル）"
              echo "詳細はセキュリティレポートを確認してください"
            else
              echo "✅ セキュリティ問題は検出されませんでした"
            fi
          else
            echo "⚠️  security_summary.json が見つかりません。個別レポートを確認します..."

            # 個別レポートの確認
            bandit_issues=0
            audit_vulnerabilities=0

            if [ -f security_reports/bandit_report.json ]; then
              bandit_issues=$(jq '.results | length' \
                security_reports/bandit_report.json 2>/dev/null || echo "0")
              echo "Bandit レポートが見つかりました: $bandit_issues 件の問題"
            fi

            if [ -f security_reports/pip_audit_report.json ]; then
              audit_vulnerabilities=$(jq '.vulnerabilities | length' \
                security_reports/pip_audit_report.json 2>/dev/null || echo "0")
              echo "pip-audit レポートが見つかりました: $audit_vulnerabilities 件の脆弱性"
            fi

            echo "Bandit 問題数: $bandit_issues"
            echo "pip-audit 脆弱性数: $audit_vulnerabilities"

            if [ "$bandit_issues" -gt 0 ] || [ "$audit_vulnerabilities" -gt 0 ]; then
              echo "⚠️  セキュリティ問題が検出されました"
            else
              echo "✅ セキュリティ問題は検出されませんでした"
            fi
          fi

      - name: セキュリティレポートのアップロード
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: security_reports/
          retention-days: 30

  secret-scan:
    name: 秘密情報スキャン
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 全履歴を取得

      - name: TruffleHog による秘密情報スキャン
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --debug --only-verified

  sbom-generation:
    name: SBOM 生成
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.scan_type == 'comprehensive' ||
       github.event.inputs.scan_type == 'sbom-only')

    permissions:
      contents: read
      actions: read

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          allow-prereleases: true

      - name: uv セットアップ
        uses: astral-sh/setup-uv@v1
        with:
          enable-cache: true

      - name: 依存関係インストール
        run: uv sync --python 3.13

      - name: SBOM 生成
        run: |
          uv run python scripts/security_scan.py --scan-type=sbom

      - name: SBOM 検証
        run: |
          if [ -f security_reports/sbom.json ]; then
            echo "✅ SBOM が正常に生成されました"
            echo "コンポーネント数: $(jq '.components | length' security_reports/sbom.json)"
            echo "生成日時: $(jq -r '.metadata.timestamp' security_reports/sbom.json)"
          else
            echo "❌ SBOM の生成に失敗しました"
            exit 1
          fi

      - name: SBOM アップロード
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: security_reports/sbom.json
          retention-days: 90
