name: リリース自動化

on:
  push:
    tags:
      - 'v*'  # タグプッシュ時のみ自動リリース
  workflow_dispatch:
    inputs:
      release_type:
        description: 'リリースタイプ'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'プレリリース'
        required: false
        default: false
        type: boolean

jobs:
  create-release:
    name: リリース作成
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: チェックアウト
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: uv セットアップ
        uses: astral-sh/setup-uv@v1

      - name: タグからバージョンを取得
        id: version
        run: |
          # タグからバージョンを取得（v プレフィックスを除去）
          tag_name="${{ github.ref_name }}"
          version="${tag_name#v}"
          echo "バージョン: $version"
          echo "タグ: $tag_name"
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "tag_name=$tag_name" >> $GITHUB_OUTPUT

      - name: リリースノート生成
        id: release_notes
        run: |
          # 最新のタグを取得
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          # コミットメッセージからリリースノートを生成
          if [ -n "$latest_tag" ]; then
            commits=$(git log ${latest_tag}..HEAD --oneline --pretty=format:"- %s")
          else
            commits=$(git log --oneline --pretty=format:"- %s")
          fi

          # カテゴリ別に分類
          features=$(echo "$commits" | grep "^- feat\|^- feature" || true)
          fixes=$(echo "$commits" | grep "^- fix\|^- bugfix" || true)
          docs=$(echo "$commits" | grep "^- docs" || true)
          others=$(echo "$commits" | grep -v "^- feat\|^- feature\|^- fix\|^- bugfix\|^- docs" || true)

          # リリースノートを構築
          release_notes="## 🚀 リリース $version"
          release_notes="$release_notes\n\n"

          if [ -n "$features" ]; then
            release_notes="$release_notes### ✨ 新機能\n$features\n\n"
          fi

          if [ -n "$fixes" ]; then
            release_notes="$release_notes### 🐛 バグ修正\n$fixes\n\n"
          fi

          if [ -n "$docs" ]; then
            release_notes="$release_notes### 📚 ドキュメント\n$docs\n\n"
          fi

          if [ -n "$others" ]; then
            release_notes="$release_notes### 🔧 その他の変更\n$others\n\n"
          fi

          release_notes="$release_notes---\n\n"
          url="https://github.com/${{ github.repository }}"
          release_notes="$release_notes**完全な変更履歴**: "
          release_notes="$release_notes$url/compare/${latest_tag}...${{ steps.version.outputs.tag_name }}"

          # 改行文字をエスケープしてGitHub Outputに設定
          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          echo -e "$release_notes" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: CHANGELOG.md 更新
        run: |
          # CHANGELOG.md が存在しない場合は作成
          if [ ! -f CHANGELOG.md ]; then
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "All notable changes to this project will be documented in this file." >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          # 新しいエントリを CHANGELOG.md の先頭に挿入
          temp_file=$(mktemp)
          echo "## [${{ steps.version.outputs.version }}] - $(date -u +%Y-%m-%d)" > "$temp_file"
          echo "" >> "$temp_file"
          notes="${{ steps.release_notes.outputs.release_notes }}"
          echo -e "$notes" | sed 's/^## 🚀 リリース [0-9.]*//' >> "$temp_file"
          echo "" >> "$temp_file"

          # 既存の CHANGELOG.md の内容を追加（最初の行「# Changelog」以降）
          if [ -f CHANGELOG.md ]; then
            tail -n +2 CHANGELOG.md >> "$temp_file"
          fi

          mv "$temp_file" CHANGELOG.md

      - name: README.md バージョンバッジ更新
        run: |
          # README.md のバージョンバッジを更新
          if [ -f README.md ]; then
            # バージョンバッジのパターンを更新
            sed -i "s/version-[0-9.]\+-/version-${{ steps.version.outputs.version }}-/g" README.md
            sed -i "s/v[0-9.]\+/v${{ steps.version.outputs.version }}/g" README.md
          fi

      - name: ドキュメント更新をコミット
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # main ブランチに切り替え
          git checkout main

          git add CHANGELOG.md README.md
          if git diff --staged --quiet; then
            echo "ドキュメントに変更はありません"
          else
            git commit -m "docs: update documentation for v${{ steps.version.outputs.version }}

            - Update CHANGELOG.md with release notes
            - Update version badges in README.md"
            git push origin main
          fi

      - name: GitHub Release 作成
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          release_name: Release ${{ steps.version.outputs.version }}
          body: ${{ steps.release_notes.outputs.release_notes }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'rc') }}

  notify-release:
    name: リリース通知
    runs-on: ubuntu-latest
    needs: [create-release]
    if: always() && needs.create-release.result == 'success'

    steps:
      - name: リリース完了通知
        run: |
          echo "🎉 リリース ${{ github.ref_name }} が正常に作成されました！"
          echo "📋 リリースページ: https://github.com/${{ github.repository }}/releases"
          echo "🔗 タグ: ${{ github.ref_name }}"
