name: リリース準備

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'リリースタイプ'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'プレリリース'
        required: false
        default: false
        type: boolean

jobs:
  prepare-release:
    name: リリース準備
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Python セットアップ
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: uv セットアップ
        uses: astral-sh/setup-uv@v1

      - name: 依存関係インストール
        run: |
          uv venv --python 3.13
          uv sync

      - name: 品質チェック実行
        run: |
          echo "リリース前の品質チェックを実行中..."

          # リンティング
          echo "::group::リンティングチェック"
          uv run ruff check .
          echo "::endgroup::"

          # フォーマット
          echo "::group::フォーマットチェック"
          uv run ruff format --check .
          echo "::endgroup::"

          # 型チェック
          echo "::group::型チェック"
          uv run mypy .
          echo "::endgroup::"

          # テスト
          echo "::group::テスト実行"
          uv run pytest --cov=src --cov-report=term-missing --cov-fail-under=60 --junit-xml=pytest-results.xml
          echo "::endgroup::"

          echo "✅ 全ての品質チェックが通過しました"

      - name: バージョン計算
        id: version
        run: |
          # 現在のバージョンを取得
          current_version=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "現在のバージョン: $current_version"

          # セマンティックバージョニングに基づいて新しいバージョンを計算
          IFS='.' read -ra VERSION_PARTS <<< "$current_version"
          major=${VERSION_PARTS[0]}
          minor=${VERSION_PARTS[1]}
          patch=${VERSION_PARTS[2]}

          release_type="${{ github.event.inputs.release_type }}"

          case $release_type in
            "major")
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            "minor")
              minor=$((minor + 1))
              patch=0
              ;;
            "patch")
              patch=$((patch + 1))
              ;;
          esac

          new_version="$major.$minor.$patch"

          # プレリリースの場合
          if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
            new_version="$new_version-rc.$(date +%Y%m%d%H%M%S)"
          fi

          echo "新しいバージョン: $new_version"
          echo "new_version=$new_version" >> $GITHUB_OUTPUT
          echo "tag_name=v$new_version" >> $GITHUB_OUTPUT

      - name: pyproject.toml のバージョン更新
        run: |
          sed -i 's/^version = ".*"/version = "${{ steps.version.outputs.new_version }}"/' pyproject.toml
          echo "pyproject.toml のバージョンを更新しました"

      - name: CHANGELOG.md の更新
        run: |
          # CHANGELOGが存在しない場合は作成
          if [ ! -f CHANGELOG.md ]; then
            cat > CHANGELOG.md << 'EOF'
          # Changelog

          All notable changes to this project will be documented in this file.

          The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
          and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

          EOF
          fi

          # 最新のタグを取得
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          # コミットメッセージからリリースノートを生成
          if [ -n "$latest_tag" ]; then
            commits=$(git log ${latest_tag}..HEAD --oneline --pretty=format:"- %s (%h)")
          else
            commits=$(git log --oneline --pretty=format:"- %s (%h)")
          fi

          # CHANGELOGに新しいエントリを追加
          temp_file=$(mktemp)
          {
            head -n 6 CHANGELOG.md
            echo ""
            echo "## [${{ steps.version.outputs.new_version }}] - $(date +%Y-%m-%d)"
            echo ""
            echo "### 変更内容"
            echo ""
            echo "$commits"
            echo ""
            tail -n +7 CHANGELOG.md
          } > "$temp_file"
          mv "$temp_file" CHANGELOG.md

      - name: 変更をコミットしてタグを作成
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add pyproject.toml CHANGELOG.md
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }}"
          git tag ${{ steps.version.outputs.tag_name }}

          echo "📤 メインブランチをプッシュ中..."
          git push origin main

          echo "🏷️ タグをプッシュ中..."
          git push origin ${{ steps.version.outputs.tag_name }}

          echo "✅ プッシュ完了"

      - name: リリース準備完了通知
        run: |
          echo "🎉 リリース準備が完了しました！"
          echo "📋 バージョン: ${{ steps.version.outputs.new_version }}"
          echo "🏷️ タグ: ${{ steps.version.outputs.tag_name }}"
          echo "🚀 タグがプッシュされたため、リリースワークフローが自動実行されます"
